name: 助成金検索

on:
  # スマホからGitHubの「Actions」タブ → 「Run workflow」ボタンで手動実行
  workflow_dispatch:

  # 定期実行: 毎週月曜 9:00 (日本時間)
  schedule:
    - cron: '0 0 * * 1'  # UTC 0:00 = JST 9:00

jobs:
  search:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 依存関係のインストール
        run: npm ci

      - name: ビルド
        run: npm run build

      - name: 助成金検索を実行
        run: node dist/index.js search

      - name: レポートをアーティファクトとして保存
        uses: actions/upload-artifact@v4
        with:
          name: grant-reports-${{ github.run_number }}
          path: output/
          retention-days: 90

      - name: レポートをリポジトリにコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f output/
          git diff --staged --quiet || git commit -m "助成金レポートを更新 $(date +'%Y-%m-%d')"
          git push

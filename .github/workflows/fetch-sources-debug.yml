name: デバッグ用ソース一括取得（一時的）

# 開発用の一時ワークフロー：各スクレイパー対象ページの実データを取得して
# このブランチにコミットする。解析ロジックの修正が終わったら不要（mainには入れない）。
on:
  push:
    branches: [claude/fetch-sources-debug]
    paths-ignore:
      - 'debug/**'

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: 各ソースの実データを取得
        run: |
          mkdir -p debug
          UA="GrantSearch/1.0 (NPO Grant Research Tool)"
          fetch() {
            curl -sSL --max-time 60 -H "User-Agent: $UA" "$1" -o "debug/$2" \
              || echo "FAILED: $1" >> debug/errors.txt
            sleep 2
          }
          # むすびえ（一覧・2ページ目・RSSフィード）
          fetch "https://musubie.org/news_cat/subsidy/" musubie-1.html
          fetch "https://musubie.org/news_cat/subsidy/page/2/" musubie-2.html
          fetch "https://musubie.org/news_cat/subsidy/feed/" musubie-feed.xml
          # CANPAN 検索結果（キーワード3種）
          curl -sSL --max-time 60 -H "User-Agent: $UA" -G \
            --data-urlencode "keyword=子ども" --data-urlencode "status=1" \
            "https://fields.canpan.info/grant/" -o debug/canpan-kodomo.html || echo "FAILED: canpan-kodomo" >> debug/errors.txt
          sleep 2
          curl -sSL --max-time 60 -H "User-Agent: $UA" -G \
            --data-urlencode "keyword=子育て" --data-urlencode "status=1" \
            "https://fields.canpan.info/grant/" -o debug/canpan-kosodate.html || echo "FAILED: canpan-kosodate" >> debug/errors.txt
          sleep 2
          curl -sSL --max-time 60 -H "User-Agent: $UA" -G \
            --data-urlencode "keyword=子ども食堂" --data-urlencode "status=1" \
            "https://fields.canpan.info/grant/" -o debug/canpan-shokudo.html || echo "FAILED: canpan-shokudo" >> debug/errors.txt
          sleep 2
          # WAM 助成の募集情報（インデックス＋最新年度の詳細）
          fetch "https://www.wam.go.jp/hp/wamjosei_boshu/" wam-boshu.html
          fetch "https://www.wam.go.jp/hp/r8_wamjyosei/" wam-r8.html
          fetch "https://www.wam.go.jp/hp/r8_wamjyosei_model/" wam-r8-model.html
          fetch "https://www.wam.go.jp/hp/r7hosei_wamjyosei/" wam-r7hosei.html
          # しみせん（京都市市民活動総合センター）ページ送りは /page/N 形式
          fetch "https://shimisen-kyoto.org/subsidies" shimisen-1.html
          fetch "https://shimisen-kyoto.org/subsidies/page/2" shimisen-2.html
          fetch "https://shimisen-kyoto.org/subsidies/page/3" shimisen-3.html
          # CANPAN 残りページ（92件・20件/ページ、keyword指定は効かないため全件取得方式）
          fetch "https://fields.canpan.info/grant/?page=2&sort=update&dir=desc" canpan-p2.html
          fetch "https://fields.canpan.info/grant/?page=3&sort=update&dir=desc" canpan-p3.html
          fetch "https://fields.canpan.info/grant/?page=4&sort=update&dir=desc" canpan-p4.html
          fetch "https://fields.canpan.info/grant/?page=5&sort=update&dir=desc" canpan-p5.html
          # まとめ記事の詳細ページ（公式リンク抽出の設計用）
          fetch "https://shimisen-kyoto.org/subsidy/52696" detail-shimisen.html
          fetch "https://fields.canpan.info/grant/detail/2474" detail-canpan.html
          fetch "https://musubie.org/news/fami/start/32444" detail-musubie.html
          # Google News のリダイレクト解決確認（最終URLを記録）
          curl -sSL --max-time 60 -H "User-Agent: $UA" -o /dev/null -w "%{url_effective}\n" \
            "https://news.google.com/rss/articles/CBMiTEFVX3lxTE1idURPLWd1WDVhZW5zSUNRR0N1WExTRG9ScVhmR1RMWXl3QTNLZ3Y3bkJ6T1JkbHlyenFsVUJxTGNqQzZTUGR2Z1NrMnE?oc=5" \
            > debug/news-redirect-result.txt 2>&1 || echo "FAILED" > debug/news-redirect-result.txt
          # DuckDuckGo HTML検索の可用性テスト（検索フォールバック設計用）
          curl -sSL --max-time 60 -H "User-Agent: $UA" -G \
            --data-urlencode "q=洲崎福祉財団 一般助成 2026年度" \
            "https://html.duckduckgo.com/html/" -o debug/ddg-test.html || echo "FAILED: ddg" >> debug/errors.txt
          sleep 2
          curl -sSL --max-time 60 -H "User-Agent: $UA" -G \
            --data-urlencode "q=令和8年度子ども食堂・ヤングケアラー等応援プロジェクト 補助金" \
            "https://html.duckduckgo.com/html/" -o debug/ddg-test2.html || echo "FAILED: ddg2" >> debug/errors.txt
          # 公式サイトの実ページ（詳細情報抽出の設計用・多様な6種）
          fetch "https://tonami-shoujukai.or.jp/infomation" official-tonami.html
          fetch "https://swf.or.jp/support1" official-swf.html
          fetch "https://www.public.or.jp/project/f0136" official-public.html
          fetch "https://www.family.co.jp/sustainability/with-sustainability/smileomu-pj.html" official-family.html
          fetch "https://www.pref.aichi.jp/soshiki/jidoukatei/kodomoshokudou-hojokin.html" official-aichi.html
          fetch "https://www.city.nagakute.lg.jp/soshiki/kodomobu/kodomokateika/1/1/21979.html" official-nagakute.html
          # Google News RSS（発見用・フォーマット確認）
          curl -sSL --max-time 60 -H "User-Agent: $UA" -G \
            --data-urlencode "q=子ども食堂 助成金" \
            --data-urlencode "hl=ja" --data-urlencode "gl=JP" --data-urlencode "ceid=JP:ja" \
            "https://news.google.com/rss/search" -o debug/news-rss.xml || echo "FAILED: news-rss" >> debug/errors.txt
          ls -la debug/

      - name: 取得結果をブランチにコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add debug/
          git diff --staged --quiet || git commit -m "debug: 各ソースの実データを取得"
          git push
